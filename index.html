<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript" src="sprite.js"></script>
    <script type="text/javascript" src="sonic.js"></script>
    <title>Colovision</title>
    <style>
      body {
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="200" height="200"></canvas>
    <script>
      const game = {
        isRunning: true,

        init() {
          game.canvas = document.getElementById("gameCanvas");
          game.context = game.canvas.getContext("2d");
          game.loader = loader;
          game.loader.init();

          this.sonic = new Sonic(43, 40, game.context, loader.images.sonic);

          // Start game
          game.drawingLoop();
        },

        drawingLoop() {
          // Clear canvas
          game.context.clearRect(0, 0, game.canvas.width, game.canvas.height);
          // Draw and update frame index
          game.sonic.render();
          game.sonic.update();

          if (game.isRunning) {
            requestAnimationFrame(game.drawingLoop);
          }
        },
      };

      const loader = {
        count: 0,
        images: {},

        add(title, src) {
          const image = new Image();
          image.src = src;
          this.images[title] = image;
          this.count++;
        },

        init() {
          loader.add("sonic", Sonic.src);
        },
      };

      window.addEventListener("load", () => {
        game.init();
      });
    </script>
  </body>
</html>
